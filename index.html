<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07101f">
  <title>🏠 Amsterdam Search</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07101f;
      --s1: #0c1828;
      --s2: #0f1f36;
      --s3: #142540;
      --b: rgba(255,255,255,0.07);
      --b2: rgba(255,255,255,0.13);
      --blue: #4a8ff5;
      --green: #22d3a0;
      --amber: #f59e0b;
      --red: #f87171;
      --purple: #a78bfa;
      --text: #d4e2f7;
      --m1: #5a7498;
      --m2: #374f6b;
      --r: 14px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: rgba(7,16,31,0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--b);
      padding: env(safe-area-inset-top,0px) 0 0;
    }
    .hdr-inner {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 16px;
      max-width: 1100px; margin: 0 auto;
    }
    .hdr-title { font-size: 16px; font-weight: 700; letter-spacing: -.3px; flex:1; min-width:120px; }
    .hdr-title span { background: linear-gradient(90deg, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hdr-meta { font-size: 11px; color: var(--m1); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pill { background: var(--s2); border: 1px solid var(--b); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--m1); white-space:nowrap; }
    .pill b { color: var(--text); }
    .pill.fresh { border-color: rgba(34,211,160,.3); color: var(--green); }
    .pill.stale { border-color: rgba(248,113,113,.3); color: var(--red); }

    /* ── Map ── */
    #map-wrap { position: relative; height: 42vh; min-height: 200px; max-height: 380px; }
    #map { height: 100%; width: 100%; }
    .map-hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(7,16,31,.85); backdrop-filter: blur(10px);
      border: 1px solid var(--b2); border-radius: 8px;
      padding: 5px 12px; font-size: 11px; color: var(--m1); white-space: nowrap;
    }

    /* ── Filters ── */
    .filters {
      display: flex; gap: 8px; padding: 11px 16px;
      overflow-x: auto; scrollbar-width: none;
      border-bottom: 1px solid var(--b);
      background: var(--bg);
      position: sticky; top: 53px; z-index: 100;
    }
    .filters::-webkit-scrollbar { display:none; }
    .chip {
      flex-shrink: 0; padding: 7px 15px; border-radius: 22px;
      border: 1px solid var(--b); background: var(--s1);
      color: var(--m1); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .chip.on { border-color: var(--blue); color: var(--blue); background: rgba(74,143,245,.1); }

    /* ── Sort bar ── */
    .sort-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; font-size: 12px; color: var(--m1);
      border-bottom: 1px solid var(--b);
    }
    .sort-bar select {
      background: transparent; border: none; color: var(--blue);
      font-size: 12px; cursor: pointer; outline: none;
      -webkit-appearance: none;
    }
    #rc { margin-left: auto; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 14px; padding: 14px 16px 100px;
      max-width: 1100px; margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--s2); border: 1px solid var(--b);
      border-radius: var(--r); overflow: hidden; cursor: pointer;
      transition: border-color .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(.98); }
    .card.hl { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 8px 32px rgba(74,143,245,.15); }
    .card.dim { opacity: .55; }

    /* Card image */
    .cimg {
      position: relative; height: 168px; overflow: hidden;
    }
    .cimg img { width:100%; height:100%; object-fit:cover; display:block; }
    .cimg .ph {
      width:100%; height:100%; display:flex; align-items:center; justify-content:center;
      font-size: 48px;
    }
    .cimg-grad { position:absolute; inset:0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.72)); }

    /* Overlays */
    .price-lbl {
      position:absolute; bottom:10px; left:12px;
      font-size: 19px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,.6);
      font-variant-numeric: tabular-nums; line-height:1;
    }
    .price-lbl sub { font-size: 11px; font-weight: 400; opacity: .75; vertical-align: baseline; }

    .badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 7px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .badge.may  { background: rgba(34,211,160,.18); border: 1px solid rgba(34,211,160,.4); color: var(--green); }
    .badge.new  { position:absolute; top:10px; left:10px; background: rgba(74,143,245,.2); border: 1px solid rgba(74,143,245,.4); color: var(--blue); }
    .badge.old  { background: rgba(90,116,152,.15); border: 1px solid rgba(90,116,152,.3); color: var(--m1); }

    /* Card body */
    .cbody { padding: 13px 14px 14px; }
    .caddr { font-size: 14px; font-weight: 650; margin-bottom: 7px; line-height: 1.3; }
    .ctags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    .tag {
      background: var(--s3); border: 1px solid var(--b);
      padding: 3px 9px; border-radius: 6px; font-size: 11px; color: var(--m1);
    }
    .tag.dist { color: var(--purple); border-color: rgba(167,139,250,.2); background: rgba(167,139,250,.05); }
    .tag.close { color: var(--green); border-color: rgba(34,211,160,.2); background: rgba(34,211,160,.05); }
    .csum {
      font-size: 12.5px; color: var(--m1); line-height: 1.55; margin-bottom: 11px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .cfoot { display: flex; align-items: center; justify-content: space-between; gap:8px; }
    .cdate { font-size: 11px; color: var(--m2); }
    .vbtn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: #fff;
      background: linear-gradient(135deg, var(--blue), #7ab5ff);
      transition: opacity .15s;
    }
    .vbtn:active { opacity: .8; }

    /* ── Empty / Loading ── */
    .state { text-align:center; padding:64px 20px; color: var(--m1); grid-column: 1/-1; }
    .state-ico { font-size: 48px; margin-bottom: 12px; }
    .spin {
      width: 36px; height: 36px; border: 3px solid var(--b2); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(22px + env(safe-area-inset-bottom,0px)); right: 16px; z-index: 300;
      width: 46px; height: 46px; background: var(--blue); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(74,143,245,.45);
      cursor: pointer; opacity: 0; pointer-events: none;
      transition: opacity .25s; font-size: 18px;
    }
    .fab.show { opacity: 1; pointer-events: all; }

    /* ── Map custom ── */
    .mpin {
      color: #fff; padding: 4px 9px; border-radius: 14px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
      box-shadow: 0 2px 10px rgba(0,0,0,.45);
      border: 1.5px solid rgba(255,255,255,.2);
    }
    .leaflet-popup-content-wrapper {
      background: var(--s2) !important; border: 1px solid var(--b2) !important;
      border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
      color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--s2) !important; }
    .leaflet-popup-content { margin: 10px 14px !important; }
    .pop-p { font-weight: 700; font-size: 15px; color: var(--blue); }
    .pop-a { font-size: 12px; color: var(--m1); margin-top: 2px; }
    .pop-d { font-size: 11px; color: var(--purple); margin-top: 2px; }

    /* Validation banner */
    .val-warn {
      background: rgba(248,113,113,.08); border-bottom: 1px solid rgba(248,113,113,.2);
      color: var(--red); font-size: 12px; padding: 8px 16px; text-align: center;
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-title">🏠 <span>Amsterdam Search</span></div>
    <div class="hdr-meta">
      <span class="pill"><b id="hdr-count">—</b> listings</span>
      <span class="pill" id="hdr-updated">Loading…</span>
    </div>
  </div>
</header>

<div id="val-banner"></div>

<div id="map-wrap">
  <div id="map"></div>
  <div class="map-hint" id="map-hint">Loading pins…</div>
</div>

<div class="filters" id="filters">
  <div class="chip on" data-f="all">All</div>
  <div class="chip" data-f="may">⭐ May 1st</div>
  <div class="chip" data-f="u2k">Under €2,000</div>
  <div class="chip" data-f="2bed">2+ Bedrooms</div>
  <div class="chip" data-f="big">60 m²+</div>
  <div class="chip" data-f="close">Within 2 km</div>
  <div class="chip" data-f="new7">New (7d)</div>
</div>

<div class="sort-bar">
  <span>Sort</span>
  <select id="sorter">
    <option value="new">Newest first</option>
    <option value="dist">Closest to Javaplein</option>
    <option value="p↑">Price ↑</option>
    <option value="p↓">Price ↓</option>
    <option value="sz↓">Largest first</option>
  </select>
  <span id="rc"></span>
</div>

<div class="grid" id="grid">
  <div class="state">
    <div class="spin"></div>
    <div>Fetching listings…</div>
  </div>
</div>

<div class="fab" id="fab">↑</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const JAVAPLEIN  = [52.3631, 4.9450];
const SEARCH_KM  = 3.0;
const DATA_URL   = 'data/listings.json';
const META_URL   = 'data/meta.json';
const GEO_CACHE  = 'ams_geo_v3';
const GEO_TTL    = 7 * 24 * 3600 * 1000;
const NOMINATIM  = 'https://nominatim.openstreetmap.org/search';

// Price-range pin colours
function pinColor(price) {
  const p = parseInt(price) || 0;
  if (p < 2000) return ['#22d3a0', '#16a97e'];
  if (p < 2500) return ['#4a8ff5', '#2563eb'];
  return ['#f59e0b', '#d97706'];
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const price = l => parseInt((l.price||'').toString().replace(/\D/g,'')) || 0;
const size  = l => parseInt((l.size||'').toString().replace(/\D/g,''))  || 0;
const rooms = l => parseInt((l.rooms||'').toString().replace(/\D/g,'')) || 0;

function fmtPrice(p) {
  return p > 0 ? `€${p.toLocaleString('nl-NL')}` : '—';
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distFromJavaplein(l) {
  // Use pre-computed distance if available
  if (l.distance_km != null) return l.distance_km;
  if (l.lat && l.lng) return haversine(JAVAPLEIN[0], JAVAPLEIN[1], l.lat, l.lng);
  return null;
}

function daysSince(d) {
  if (!d) return null;
  const diff = Date.now() - new Date(d);
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  return `${days}d ago`;
}

function isNew7(l) {
  if (!l.date_found) return false;
  return (Date.now() - new Date(l.date_found)) < 7 * 86400000;
}

function isOld(l) {
  if (!l.date_found) return false;
  return (Date.now() - new Date(l.date_found)) > 30 * 86400000;
}

function isMay(l) {
  const a = (l.available || '').toString();
  return /^yes$/i.test(a.trim());
}

// ── Geo cache ────────────────────────────────────────────────────────────────
function gcGet() {
  try { return JSON.parse(localStorage.getItem(GEO_CACHE) || '{}'); } catch { return {}; }
}
function gcSet(c) { try { localStorage.setItem(GEO_CACHE, JSON.stringify(c)); } catch {} }

// ── Map ──────────────────────────────────────────────────────────────────────
let map, layerGroup, markers = [];

function initMap() {
  map = L.map('map', { center: JAVAPLEIN, zoom: 13, zoomControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap ©CARTO', subdomains: 'abcd', maxZoom: 20
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // 3km search radius circle
  L.circle(JAVAPLEIN, {
    radius: SEARCH_KM * 1000,
    color: '#4a8ff5', fillColor: '#4a8ff5',
    fillOpacity: 0.04, weight: 1.5, dashArray: '6 4',
    opacity: 0.5,
  }).addTo(map);

  // Javaplein marker
  L.circleMarker(JAVAPLEIN, {
    radius: 6, color: '#4a8ff5', fillColor: '#4a8ff5', fillOpacity: 1, weight: 2,
  }).bindPopup('<div class="pop-p">📍 Javaplein</div><div class="pop-a">Search centre (3 km radius)</div>').addTo(map);

  layerGroup = L.layerGroup().addTo(map);
}

function addPin(listing) {
  if (!listing.lat || !listing.lng) return;
  const p = price(listing);
  const [c1, c2] = pinColor(p);
  const icon = L.divIcon({
    className: '',
    html: `<div class="mpin" style="background:linear-gradient(135deg,${c1},${c2})">${fmtPrice(p)}</div>`,
    iconAnchor: [28, 14],
  });
  const dist = distFromJavaplein(listing);
  const distStr = dist != null ? `📍 ${dist.toFixed(1)} km` : '';
  const m = L.marker([listing.lat, listing.lng], { icon })
    .bindPopup(`
      <div class="pop-p">${fmtPrice(p)}/mo</div>
      <div class="pop-a">${listing.address || ''}</div>
      ${distStr ? `<div class="pop-d">${distStr} from Javaplein</div>` : ''}
    `, { maxWidth: 230 }).addTo(layerGroup);
  m.on('click', () => scrollToCard(listing._i));
  markers.push({ m, listing });
}

function scrollToCard(i) {
  const el = document.querySelector(`[data-i="${i}"]`);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('hl');
  setTimeout(() => el.classList.remove('hl'), 2200);
}

window._fly = function(i) {
  const mk = markers.find(m => m.listing._i === i);
  if (mk && mk.listing.lat) {
    map.flyTo([mk.listing.lat, mk.listing.lng], 16, { duration: 0.7 });
    mk.m.openPopup();
  }
};

// ── Geocoding queue ──────────────────────────────────────────────────────────
let geoQ = [], geoRunning = false;
function geocode(address) {
  const cache = gcGet();
  const key = address.toLowerCase().trim();
  if (cache[key]) return Promise.resolve(cache[key]);
  return new Promise(r => { geoQ.push({ address, key, r }); runGeoQ(); });
}
async function runGeoQ() {
  if (geoRunning || !geoQ.length) return;
  geoRunning = true;
  while (geoQ.length) {
    const { address, key, r } = geoQ.shift();
    // Strip neighborhood suffixes like "(Oosterparkbuurt/...)"
    const clean = address.replace(/\s*\([^)]+\)/g, '').trim();
    try {
      const q = encodeURIComponent(`${clean}, Amsterdam, Netherlands`);
      const res = await fetch(`${NOMINATIM}?q=${q}&format=json&limit=1&countrycodes=nl`, {
        headers: { 'User-Agent': 'ApartmentFinder/1.0 (gudfinnurs)' }
      });
      const d = await res.json();
      if (d[0]) {
        const c = [parseFloat(d[0].lat), parseFloat(d[0].lon)];
        const cache = gcGet(); cache[key] = c; gcSet(cache);
        r(c);
      } else r(null);
    } catch { r(null); }
    if (geoQ.length) await new Promise(x => setTimeout(x, 1100));
  }
  geoRunning = false;
}

async function geocodeAll(listings) {
  let pinned = 0;
  const total = listings.filter(l => !l.lat).length;
  for (const l of listings) {
    if (l.lat && l.lng) { addPin(l); pinned++; continue; }
    if (!l.address) continue;
    const c = await geocode(l.address);
    if (c) { l.lat = c[0]; l.lng = c[1]; addPin(l); pinned++; }
  }
  document.getElementById('map-hint').textContent = `${pinned} pins · 📍 3km radius from Javaplein`;
}

// ── Filter & sort ─────────────────────────────────────────────────────────────
let all = [], activeFilter = 'all';

function filtered() {
  let r = [...all];
  switch (activeFilter) {
    case 'may':   r = r.filter(isMay); break;
    case 'u2k':   r = r.filter(l => price(l) > 0 && price(l) < 2000); break;
    case '2bed':  r = r.filter(l => rooms(l) >= 2); break;
    case 'big':   r = r.filter(l => size(l) >= 60); break;
    case 'close': r = r.filter(l => { const d = distFromJavaplein(l); return d != null && d <= 2; }); break;
    case 'new7':  r = r.filter(isNew7); break;
  }
  const s = document.getElementById('sorter').value;
  switch (s) {
    case 'dist': r.sort((a,b) => (distFromJavaplein(a)??99) - (distFromJavaplein(b)??99)); break;
    case 'p↑':   r.sort((a,b) => price(a) - price(b)); break;
    case 'p↓':   r.sort((a,b) => price(b) - price(a)); break;
    case 'sz↓':  r.sort((a,b) => size(b) - size(a)); break;
    default: r.sort((a,b) => new Date(b.date_found||0) - new Date(a.date_found||0));
  }
  return r;
}

// ── Render card ───────────────────────────────────────────────────────────────
function cardHTML(l) {
  const p = price(l);
  const dist = distFromJavaplein(l);
  const distStr = dist != null ? dist.toFixed(1) : '?';
  const distClass = dist != null && dist <= 1.5 ? 'close' : 'dist';
  const may = isMay(l);
  const newListing = isNew7(l);
  const old = isOld(l);

  // Gradient based on index
  const grads = [
    ['#1a3a6b','#0c2040'], ['#1a4a3a','#0c2820'],
    ['#3a2a1a','#201508'], ['#2a1a4a','#150828'],
    ['#1a3a4a','#0c1f28'], ['#3a1a2a','#200810'],
  ];
  const [g1, g2] = grads[l._i % grads.length];

  let imgHTML;
  if (l.photo_url) {
    imgHTML = `<img src="${l.photo_url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
    <div class="ph" style="background:linear-gradient(135deg,${g1},${g2});display:none">🏢</div>`;
  } else {
    imgHTML = `<div class="ph" style="background:linear-gradient(135deg,${g1},${g2})">🏢</div>`;
  }

  const tags = [
    l.size  ? `📐 ${l.size} m²` : '',
    l.rooms ? `🛏 ${l.rooms} rooms` : '',
    dist != null ? `📍 ${distStr} km` : '',
  ].filter(Boolean);

  return `
    <div class="card${old ? ' dim' : ''}" data-i="${l._i}" onclick="window._fly(${l._i})">
      <div class="cimg">
        ${imgHTML}
        <div class="cimg-grad"></div>
        <div class="price-lbl">${fmtPrice(p)}<sub>/mo</sub></div>
        ${may ? '<div class="badge may">⭐ May 1st</div>' : ''}
        ${newListing ? '<div class="badge new">NEW</div>' : ''}
        ${old && !newListing && !may ? '<div class="badge old">30d+</div>' : ''}
      </div>
      <div class="cbody">
        <div class="caddr">${l.address || 'Amsterdam'}</div>
        <div class="ctags">
          ${tags.map((t,i) => `<span class="tag${i===2?' '+distClass:''}">${t}</span>`).join('')}
        </div>
        ${l.summary ? `<div class="csum">${l.summary}</div>` : ''}
        <div class="cfoot">
          <div class="cdate">${daysSince(l.date_found) || ''}</div>
          ${l.url ? `<a class="vbtn" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View →</a>` : ''}
        </div>
      </div>
    </div>`;
}

function render() {
  const f = filtered();
  document.getElementById('rc').textContent = activeFilter !== 'all' ? `${f.length} result${f.length!==1?'s':''}` : '';
  const grid = document.getElementById('grid');
  if (!f.length) {
    grid.innerHTML = `<div class="state"><div class="state-ico">🔍</div><div>No listings match this filter</div></div>`;
    return;
  }
  grid.innerHTML = f.map(cardHTML).join('');
}

// ── Validation banner ─────────────────────────────────────────────────────────
function showValidation(listings, meta) {
  const issues = [];
  const now = Date.now();

  // Check freshness
  if (meta?.updated) {
    const age = (now - new Date(meta.updated)) / 3600000;
    if (age > 26) issues.push(`⚠️ Data is ${Math.round(age)}h old — daily update may have failed`);
  }

  // Check for furnished listings (shouldn't exist)
  const furnished = listings.filter(l => /gemeubileerd|gestoffeerd|furnished/i.test(l.furnished || '') && !/unfurnished|kaal/i.test(l.furnished || ''));
  if (furnished.length > 0) issues.push(`⚠️ ${furnished.length} potentially furnished listing(s) in data`);

  const banner = document.getElementById('val-banner');
  if (issues.length) {
    banner.innerHTML = issues.map(i => `<div class="val-warn">${i}</div>`).join('');
  }
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const [dataRes, metaRes] = await Promise.all([
      fetch(DATA_URL + '?t=' + Math.floor(Date.now() / 3600000)),
      fetch(META_URL + '?t=' + Math.floor(Date.now() / 3600000)).catch(() => null),
    ]);

    if (!dataRes.ok) throw new Error(`HTTP ${dataRes.status}`);
    const listings = await dataRes.json();
    const meta = metaRes?.ok ? await metaRes.json() : null;

    all = listings.map((l, i) => ({ ...l, _i: i }));

    // Header badges
    document.getElementById('hdr-count').textContent = all.length;
    const updEl = document.getElementById('hdr-updated');
    if (meta?.updated) {
      const age = (Date.now() - new Date(meta.updated)) / 3600000;
      updEl.textContent = `Updated ${new Date(meta.updated).toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })}`;
      updEl.className = `pill ${age > 26 ? 'stale' : 'fresh'}`;
    } else {
      updEl.textContent = 'Data loaded';
      updEl.className = 'pill';
    }

    showValidation(all, meta);
    render();
    geocodeAll(all);

  } catch (err) {
    document.getElementById('grid').innerHTML = `
      <div class="state">
        <div class="state-ico">⚠️</div>
        <div>Could not load listings<br><small>${err.message}</small></div>
      </div>`;
    document.getElementById('map-hint').textContent = 'Error loading data';
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  activeFilter = chip.dataset.f;
  render();
});

document.getElementById('sorter').addEventListener('change', render);

const fab = document.getElementById('fab');
window.addEventListener('scroll', () => fab.classList.toggle('show', scrollY > 400));
fab.addEventListener('click', () => scrollTo({ top: 0, behavior: 'smooth' }));

// ── Boot ──────────────────────────────────────────────────────────────────────
initMap();
load();
</script>
</body>
</html>
