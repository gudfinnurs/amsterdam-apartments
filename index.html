<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#040d1a">
  <title>Amsterdam Apartments</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #040d1a;
      --sheet:  #07121f;
      --card:   #0b1d30;
      --card2:  #0f2438;
      --b:      rgba(255,255,255,0.06);
      --b2:     rgba(255,255,255,0.13);
      --blue:   #3d88f0;
      --blue2:  #6ba5f5;
      --green:  #1fcc97;
      --amber:  #f0a020;
      --red:    #ef4444;
      --text:   #dce8fa;
      --m1:     #52708f;
      --m2:     #2d4a62;
      --hh:     54px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --peek:   76px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ──────────────────────────────────────────────────────── */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: var(--hh); padding-top: env(safe-area-inset-top,0px);
      background: rgba(4,13,26,.94);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--b);
      display: flex; align-items: center;
    }
    #hdr-in {
      width: 100%; max-width: 1200px; margin: 0 auto;
      padding: 0 16px; display: flex; align-items: center; gap: 10px;
    }
    .htitle { font-size: 16px; font-weight: 700; letter-spacing: -.4px; flex: 1; }
    .htitle span { background: linear-gradient(90deg,var(--blue2),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hpill {
      padding: 4px 11px; border-radius: 20px; font-size: 11px; white-space: nowrap;
      background: var(--card); border: 1px solid var(--b2); color: var(--m1);
    }
    .hpill b { color: var(--text); }
    .hpill.ok  { color: var(--green); border-color: rgba(31,204,151,.3); }
    .hpill.err { color: var(--red);   border-color: rgba(239,68,68,.3); }

    /* ─── MAP ─────────────────────────────────────────────────────────── */
    #map {
      position: fixed; top: var(--hh); left: 0; right: 0; bottom: 0; z-index: 0;
    }

    /* ─── FLOATING FILTERS (over map, mobile only) ─────────────────────── */
    #mf-wrap {
      position: fixed; top: var(--hh); left: 0; right: 0; z-index: 100;
      background: linear-gradient(to bottom, rgba(4,13,26,.85) 60%, transparent);
      padding: 10px 12px 20px;
      pointer-events: none;
    }
    #mf-scroll {
      display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none;
      pointer-events: all;
      -webkit-overflow-scrolling: touch;
    }
    #mf-scroll::-webkit-scrollbar { display: none; }
    .mchip {
      flex-shrink: 0; padding: 7px 15px; border-radius: 22px; font-size: 12.5px; font-weight: 500;
      cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent;
      background: rgba(7,18,31,.88); border: 1px solid var(--b2); color: var(--m1);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all .15s;
    }
    .mchip.on { color: var(--blue); border-color: var(--blue); background: rgba(61,136,240,.15); }

    /* ─── "SHOW LIST" BUTTON (over map, mobile) ──────────────────────── */
    #list-btn {
      position: fixed; bottom: calc(var(--peek) + 20px); left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: rgba(7,18,31,.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--b2); border-radius: 24px;
      padding: 10px 24px; font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transition: opacity .2s, transform .2s;
    }
    #list-btn:active { transform: translateX(-50%) scale(.96); }
    #list-btn.hidden { opacity: 0; pointer-events: none; }

    /* ─── PREVIEW CARD (slides up when pin is tapped) ─────────────────── */
    #preview {
      position: fixed; left: 12px; right: 12px; z-index: 200;
      bottom: calc(var(--peek) + 12px);
      background: var(--card);
      border: 1px solid var(--b2); border-radius: 18px;
      box-shadow: 0 -4px 40px rgba(0,0,0,.6), 0 8px 32px rgba(0,0,0,.4);
      transform: translateY(calc(100% + 80px));
      transition: transform .38s cubic-bezier(.25,.46,.45,.94);
      overflow: hidden;
    }
    #preview.show { transform: translateY(0); }

    .pv-img {
      position: relative; height: 130px; overflow: hidden; background: var(--card2);
    }
    .pv-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pv-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 44px; }
    .pv-grad { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,.65)); }
    .pv-price {
      position: absolute; bottom: 10px; left: 12px;
      font-size: 20px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,.6); line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .pv-price sub { font-size: 11px; font-weight: 400; opacity: .7; vertical-align: baseline; }
    .pv-may {
      position: absolute; top: 10px; right: 10px;
      background: rgba(31,204,151,.2); border: 1px solid rgba(31,204,151,.4);
      color: var(--green); font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 7px;
      backdrop-filter: blur(8px);
    }
    #pv-close {
      position: absolute; top: 10px; left: 10px;
      width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(0,0,0,.5); backdrop-filter: blur(8px); color: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 5;
    }
    .pv-body { padding: 12px 14px 14px; }
    .pv-addr { font-size: 14px; font-weight: 650; margin-bottom: 7px; line-height: 1.3; }
    .pv-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 11px; }
    .pv-tag {
      padding: 3px 9px; border-radius: 6px; font-size: 11px;
      background: var(--card2); border: 1px solid var(--b); color: var(--m1);
    }
    .pv-tag.near { color: var(--green); border-color: rgba(31,204,151,.2); background: rgba(31,204,151,.05); }
    .pv-tag.mid  { color: var(--blue2); border-color: rgba(61,136,240,.2);  background: rgba(61,136,240,.05); }
    .pv-actions { display: flex; gap: 8px; }
    .pv-mapbtn {
      flex: 0 0 auto; padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      background: var(--card2); border: 1px solid var(--b2); color: var(--m1); cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: all .15s;
    }
    .pv-view {
      flex: 1; padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: #fff; text-align: center;
      background: linear-gradient(135deg, var(--blue), #5ba8ff);
      box-shadow: 0 2px 12px rgba(61,136,240,.3);
      -webkit-tap-highlight-color: transparent; transition: opacity .15s;
    }
    .pv-view:active, .pv-mapbtn:active { opacity: .8; }

    /* ─── BOTTOM SHEET ────────────────────────────────────────────────── */
    #sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 150;
      top: var(--hh);
      display: flex; flex-direction: column;
      background: var(--sheet);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 40px rgba(0,0,0,.7);
      transform: translateY(calc(100% - var(--peek)));
      transition: transform .38s cubic-bezier(.25,.46,.45,.94);
      will-change: transform;
    }
    #sheet.no-anim { transition: none; }

    /* handle */
    #sh-handle {
      flex-shrink: 0; padding: 10px 16px 8px;
      touch-action: none; cursor: grab; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #sh-handle:active { cursor: grabbing; }
    #sh-pip-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
    #sh-pip { width: 36px; height: 4px; border-radius: 2px; background: var(--m2); }
    #sh-top { display: flex; align-items: center; justify-content: space-between; }
    #sh-count { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    #sh-mapbtn {
      display: none; padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--card2); border: 1px solid var(--b2); color: var(--blue2);
      -webkit-tap-highlight-color: transparent;
    }
    #sh-mapbtn.vis { display: flex; align-items: center; gap: 5px; }

    /* filter / sort in sheet */
    #sh-filters {
      flex-shrink: 0; display: flex; gap: 7px;
      padding: 6px 14px 4px; overflow-x: auto; scrollbar-width: none;
      border-top: 1px solid var(--b);
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    #sh-filters::-webkit-scrollbar { display: none; }
    #sh-filters.vis { opacity: 1; pointer-events: all; }
    .schip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: all .15s;
      background: var(--card); border: 1px solid var(--b); color: var(--m1);
      -webkit-tap-highlight-color: transparent;
    }
    .schip.on { color: var(--blue); border-color: var(--blue); background: rgba(61,136,240,.1); }

    #sh-sort {
      flex-shrink: 0; display: flex; align-items: center; gap: 6px;
      padding: 5px 14px 8px; font-size: 11.5px; color: var(--m1);
      border-bottom: 1px solid var(--b);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #sh-sort.vis { opacity: 1; pointer-events: all; }
    #sh-sort select {
      background: transparent; border: none; color: var(--blue2);
      font-size: 11.5px; cursor: pointer; outline: none; -webkit-appearance: none;
    }
    #rc { margin-left: auto; font-size: 11px; }

    /* cards */
    #grid-wrap {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 10px 12px calc(24px + var(--safe-b));
    }
    #grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

    /* ─── CARD ────────────────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--b); border-radius: 16px;
      overflow: hidden; cursor: pointer;
      transition: border-color .2s, opacity .2s;
      -webkit-tap-highlight-color: transparent;
      animation: fadeUp .3s ease both;
      text-decoration: none; display: block; color: inherit;
    }
    .card:active { opacity: .88; }
    .card.hl {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px rgba(61,136,240,.35), 0 8px 32px rgba(61,136,240,.12);
    }
    .card.old { opacity: .48; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cimg {
      position: relative; height: 170px; overflow: hidden; background: var(--card2);
    }
    /* Swipeable photo carousel inside .cimg */
    .cscroll {
      position: absolute; inset: 0;
      display: flex; overflow-x: scroll;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cscroll::-webkit-scrollbar { display: none; }
    .cslide { flex-shrink: 0; width: 100%; height: 100%; scroll-snap-align: start; }
    .cslide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 50px; }
    .cgrad { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.06) 0%, rgba(0,0,0,.58) 100%); pointer-events: none; }
    /* Dot indicators */
    .cdots {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; z-index: 5; pointer-events: none;
    }
    .cdot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.35); transition: all .2s; flex-shrink: 0; }
    .cdot.on { background: rgba(255,255,255,.9); width: 14px; border-radius: 3px; }
    .cphcount {
      position: absolute; top: 44px; right: 10px; z-index: 5;
      background: rgba(0,0,0,.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border-radius: 5px; padding: 2px 7px; font-size: 10px; color: rgba(255,255,255,.75);
    }

    .cprice {
      position: absolute; bottom: 10px; left: 12px;
      font-size: 20px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,.6); line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .cprice sub { font-size: 11px; font-weight: 400; opacity: .7; vertical-align: baseline; }

    .cbadge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 7px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .cbadge.may  { background: rgba(31,204,151,.2);  border: 1px solid rgba(31,204,151,.4); color: var(--green); }
    .cbadge.new  { position:absolute; top:10px; left:12px; background: rgba(61,136,240,.2); border: 1px solid rgba(61,136,240,.4); color: var(--blue2); }
    .cbadge.aged { background: rgba(82,112,143,.12); border: 1px solid rgba(82,112,143,.25); color: var(--m1); }

    .cbody { padding: 12px 14px 13px; }
    .caddr { font-size: 14px; font-weight: 650; margin-bottom: 7px; line-height: 1.3; }
    /* Key rental info row */
    .cinfo {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      padding: 6px 0 8px; margin-bottom: 7px;
      border-bottom: 1px solid var(--b);
    }
    .ci-avail { font-size: 12px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 4px; }
    .ci-contract { font-size: 12px; font-weight: 500; color: var(--amber); display: flex; align-items: center; gap: 4px; }
    .ci-unknown { font-size: 11px; color: var(--m2); }

    .ctags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .tag { padding: 3px 9px; border-radius: 6px; font-size: 11px; background: var(--card2); border: 1px solid var(--b); color: var(--m1); }
    .tag.near { color: var(--green); border-color: rgba(31,204,151,.2); background: rgba(31,204,151,.05); }
    .tag.mid  { color: var(--blue2); border-color: rgba(61,136,240,.2);  background: rgba(61,136,240,.05); }

    .csum { font-size: 12.5px; color: var(--m1); line-height: 1.6; margin-bottom: 10px; }
    .cfoot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .cdate { font-size: 11px; color: var(--m2); }
    .cactions { display: flex; align-items: center; gap: 7px; }

    .mapbtn {
      padding: 7px 12px; border-radius: 9px; font-size: 12px;
      background: var(--card2); border: 1px solid var(--b2); color: var(--m1);
      cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .viewbtn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: #fff;
      background: linear-gradient(135deg, var(--blue), #5ba8ff);
      box-shadow: 0 2px 10px rgba(61,136,240,.3);
      -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .mapbtn:active, .viewbtn:active { opacity: .8; }

    /* ─── STATES ─────────────────────────────────────────────────────── */
    .state { text-align: center; padding: 56px 20px; color: var(--m1); grid-column: 1/-1; }
    .spin { width: 34px; height: 34px; border: 3px solid var(--b2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* OSM dark-mode filter (applied to tile images only, not overlays) */
    .osm-tiles {
      filter: invert(100%) hue-rotate(180deg) brightness(0.72) contrast(0.88) saturate(0.82);
    }

    /* ─── LANDMARK LABELS ───────────────────────────────────────────── */
    .lmark {
      background: rgba(4,13,26,.82); border-radius: 5px; padding: 2px 8px;
      font-size: 10px; font-weight: 500; white-space: nowrap;
      pointer-events: none; user-select: none;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid transparent; letter-spacing: .02em;
    }
    .lmark.park    { color: rgba(80,210,80,.9);   border-color: rgba(80,210,80,.18);  }
    .lmark.station { color: rgba(110,165,245,.9); border-color: rgba(110,165,245,.18);}
    .lmark.poi     { color: rgba(230,185,90,.9);  border-color: rgba(230,185,90,.18); }
    .lmark.water   { color: rgba(80,160,230,.75); border-color: rgba(80,160,230,.15); font-style: italic; }

    /* ─── MAP STYLES ─────────────────────────────────────────────────── */
    .mpin { color: #fff; padding: 5px 10px; border-radius: 14px; font-size: 11.5px; font-weight: 700; white-space: nowrap; box-shadow: 0 3px 12px rgba(0,0,0,.5); border: 1.5px solid rgba(255,255,255,.18); cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .mpin.sel { transform: scale(1.15); box-shadow: 0 4px 20px rgba(61,136,240,.5), 0 0 0 3px rgba(61,136,240,.3); }

    .leaflet-popup-content-wrapper { display: none !important; } /* we use preview card instead */
    .leaflet-popup-tip-container { display: none !important; }

    /* ─── FAB ─────────────────────────────────────────────────────────── */
    #fab { position: fixed; right: 16px; bottom: calc(var(--peek) + 16px); z-index: 160; width: 44px; height: 44px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(61,136,240,.5); cursor: pointer; opacity: 0; pointer-events: none; transition: opacity .25s; font-size: 17px; }
    #fab.vis { opacity: 1; pointer-events: all; }

    /* ─── VALIDATION BANNER ──────────────────────────────────────────── */
    #vbanner:not(:empty) {
      position: fixed; top: var(--hh); left: 0; right: 0; z-index: 250;
      background: rgba(239,68,68,.1); border-bottom: 1px solid rgba(239,68,68,.2);
      color: var(--red); font-size: 11px; padding: 6px 16px; text-align: center;
    }

    /* ─── DESKTOP ≥ 768px ────────────────────────────────────────────── */
    @media (min-width: 768px) {
      html, body { overflow: auto; }
      #map { position: relative; top: auto; left: auto; right: auto; bottom: auto; height: 46vh; min-height: 260px; max-height: 420px; margin-top: var(--hh); }
      #mf-wrap, #list-btn { display: none; }
      #preview { display: none; }
      #sheet { position: static; transform: none !important; border-radius: 0; box-shadow: none; background: var(--bg); flex: none; top: auto; }
      #sh-handle { display: none; }
      #sh-mapbtn { display: none !important; }
      #sh-filters { opacity: 1 !important; pointer-events: all !important; padding: 12px 16px 4px; max-width: 1200px; margin: 0 auto; border: none; }
      #sh-sort { opacity: 1 !important; pointer-events: all !important; max-width: 1200px; margin: 0 auto; }
      #grid-wrap { overflow: visible; padding: 12px 16px 80px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; }
      .card:hover { border-color: rgba(61,136,240,.3); box-shadow: 0 6px 24px rgba(0,0,0,.25); transform: translateY(-2px); }
      .card { transition: border-color .2s, box-shadow .2s, transform .2s, opacity .2s; }
      #fab { bottom: 24px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header id="hdr">
  <div id="hdr-in">
    <div class="htitle">🏠 <span>Amsterdam</span></div>
    <span class="hpill"><b id="hdr-n">—</b> listings</span>
    <span class="hpill" id="hpill-upd">Loading…</span>
  </div>
</header>

<div id="vbanner"></div>

<!-- Map (full screen behind everything on mobile) -->
<div id="map"></div>

<!-- Floating filter chips over map (mobile) -->
<div id="mf-wrap">
  <div id="mf-scroll">
    <div class="mchip on" data-f="all">All</div>
    <div class="mchip" data-f="may">⭐ May 1st</div>
    <div class="mchip" data-f="u2k">Under €2,000</div>
    <div class="mchip" data-f="2bed">2+ Bedrooms</div>
    <div class="mchip" data-f="big">60 m²+</div>
    <div class="mchip" data-f="close">Within 2 km</div>
    <div class="mchip" data-f="new7">New (7d)</div>
  </div>
</div>

<!-- Preview card (slides up when pin tapped, mobile) -->
<div id="preview">
  <div class="pv-img" id="pv-img">
    <button id="pv-close" onclick="closePreview()">✕</button>
  </div>
  <div class="pv-body">
    <div class="pv-addr" id="pv-addr"></div>
    <div class="pv-tags" id="pv-tags"></div>
    <div class="pv-actions">
      <button class="pv-mapbtn" onclick="showInList()">☰ Show in list</button>
      <a class="pv-view" id="pv-link" href="#" target="_blank" rel="noopener">View listing →</a>
    </div>
  </div>
</div>

<!-- "Show list" button over map (mobile) -->
<button id="list-btn" onclick="expandSheet()">
  <span>☰</span><span id="list-btn-txt">— listings</span>
</button>

<!-- Bottom sheet -->
<div id="sheet">
  <div id="sh-handle">
    <div id="sh-pip-wrap"><div id="sh-pip"></div></div>
    <div id="sh-top">
      <span id="sh-count">— apartments</span>
      <button id="sh-mapbtn" onclick="collapseSheet()">← Map</button>
    </div>
  </div>

  <!-- Filters inside sheet (visible when expanded) -->
  <div id="sh-filters">
    <div class="schip on" data-f="all">All</div>
    <div class="schip" data-f="may">⭐ May 1st</div>
    <div class="schip" data-f="u2k">Under €2,000</div>
    <div class="schip" data-f="2bed">2+ Bedrooms</div>
    <div class="schip" data-f="big">60 m²+</div>
    <div class="schip" data-f="close">Within 2 km</div>
    <div class="schip" data-f="new7">New (7d)</div>
  </div>

  <div id="sh-sort">
    <span>Sort by</span>
    <select id="sorter">
      <option value="new">Newest first</option>
      <option value="dist">Closest to Javaplein</option>
      <option value="p↑">Price ↑</option>
      <option value="p↓">Price ↓</option>
      <option value="sz↓">Largest first</option>
    </select>
    <span id="rc"></span>
  </div>

  <div id="grid-wrap">
    <div id="grid">
      <div class="state"><div class="spin"></div><div>Loading listings…</div></div>
    </div>
  </div>
</div>

<div id="fab">↑</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const JAVAPLEIN    = [52.3631, 4.9450];
const SCI_PARK     = [52.3529, 4.9483];
const DATA_URL     = 'data/listings.json';
const META_URL     = 'data/meta.json';
const GEO_KEY      = 'ams_geo_v5';

const GRADS = [
  { g: 'linear-gradient(145deg,#0a1e38,#0d2a50)', e: '🏙️' },
  { g: 'linear-gradient(145deg,#0e1f15,#102a1c)', e: '🌿' },
  { g: 'linear-gradient(145deg,#1e1008,#2a1a0c)', e: '🧱' },
  { g: 'linear-gradient(145deg,#14082c,#1c0e3a)', e: '🌆' },
  { g: 'linear-gradient(145deg,#081820,#0c2030)', e: '🌊' },
  { g: 'linear-gradient(145deg,#1a1006,#221808)', e: '☀️' },
  { g: 'linear-gradient(145deg,#081a1c,#0c2428)', e: '🏗️' },
  { g: 'linear-gradient(145deg,#18080e,#200e16)', e: '🌸' },
];

// ── Helpers ────────────────────────────────────────────────────────────────
const price = l => parseInt((l.price||'').toString().replace(/\D/g,'')) || 0;
const size  = l => parseInt((l.size||'').toString().replace(/\D/g,''))  || 0;
const rooms = l => parseInt((l.rooms||'').toString().replace(/\D/g,'')) || 0;
const fmtP  = p => p > 0 ? `€${p.toLocaleString('nl-NL')}` : '—';

function hav(lat1,lng1,lat2,lng2) {
  const R=6371,r=x=>x*Math.PI/180;
  const a=Math.sin(r(lat2-lat1)/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(r(lng2-lng1)/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const distJava  = l => l.distance_km ?? (l.lat&&l.lng ? hav(JAVAPLEIN[0],JAVAPLEIN[1],l.lat,l.lng) : null);
const distWork  = l => l.lat && l.lng ? hav(SCI_PARK[0],SCI_PARK[1],l.lat,l.lng) : null;

function daysAgo(d) {
  if (!d) return '';
  const n = Math.floor((Date.now()-new Date(d))/86400000);
  return n===0?'Today':n===1?'Yesterday':`${n}d ago`;
}
const isNew7 = l => l.date_found && (Date.now()-new Date(l.date_found)) < 7*86400000;
const isOld  = l => l.date_found && (Date.now()-new Date(l.date_found)) > 30*86400000;
const isMay  = l => /^yes$/i.test((l.available||'').trim());

function pinColor(p) {
  if (p<2000) return ['#1fcc97','#12a87a'];
  if (p<2500) return ['#3d88f0','#2563c8'];
  return ['#f0a020','#c07c10'];
}

// ── Geo cache ──────────────────────────────────────────────────────────────
const gcGet=()=>{try{return JSON.parse(localStorage.getItem(GEO_KEY)||'{}')}catch{return{}}};
const gcSet=c=>{try{localStorage.setItem(GEO_KEY,JSON.stringify(c))}catch{}};

// ── Map ────────────────────────────────────────────────────────────────────
let map, pinLayer, markers = [], activeListing = null;

function initMap() {
  map = L.map('map', {
    center: JAVAPLEIN, zoom: 13,
    zoomControl: false, attributionControl: false,
    preferCanvas: true,   // Canvas renderer is faster for many GeoJSON features
  });
  // OpenStreetMap base layer — shows parks (green), water (blue), landmarks naturally.
  // CSS class applies a dark-mode invert+hue-rotate so it looks good on dark UI.
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors',
    maxZoom: 20,
    keepBuffer: 4,       // Cache more tiles when panning
    className: 'osm-tiles',
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.control.attribution({ position: 'bottomleft', prefix: '&copy; <a href="https://osm.org/copyright">OpenStreetMap</a>' }).addTo(map);

  // 3km search radius
  L.circle(JAVAPLEIN, {
    radius: 3000, color: '#3d88f0', fillColor: '#3d88f0',
    fillOpacity: 0.04, weight: 1.5, dashArray: '6 4', opacity: 0.4
  }).addTo(map);

  // Science Park — work marker
  const workIcon = L.divIcon({
    className: '',
    html: `<div style="background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 14px rgba(239,68,68,.55),0 0 0 2px rgba(239,68,68,.25);border:2px solid rgba(255,255,255,.2)">💼</div>`,
    iconAnchor: [17, 17],
  });
  L.marker(SCI_PARK, { icon: workIcon, zIndexOffset: 1000 })
    .bindPopup('<div class="pp" style="color:#f87171">💼 Work</div><div class="pa">Amsterdam Science Park</div>')
    .addTo(map);

  // Javaplein dot
  L.circleMarker(JAVAPLEIN, {
    radius: 7, color: '#3d88f0', fillColor: '#3d88f0', fillOpacity: 1, weight: 2, zIndexOffset: 1000,
  }).bindPopup('<div class="pp">📍 Javaplein</div><div class="pa">Search centre · 3 km radius</div>').addTo(map);

  pinLayer = L.layerGroup().addTo(map);

  // Landmarks + parks/water (non-blocking)
  addLandmarks();
  loadMapFeatures();

  // Tapping map background dismisses preview
  map.on('click', () => {
    closePreview();
    clearSelPin();
  });
}

function clearSelPin() {
  markers.forEach(({m}) => m._icon?.querySelector('.mpin')?.classList.remove('sel'));
}

function addPin(l) {
  if (!l.lat || !l.lng) return;
  const p = price(l);
  const [c1,c2] = pinColor(p);
  const icon = L.divIcon({
    className: '',
    html: `<div class="mpin" style="background:linear-gradient(135deg,${c1},${c2})">${fmtP(p)}</div>`,
    iconAnchor: [30, 14],
  });
  const m = L.marker([l.lat, l.lng], { icon }).addTo(pinLayer);

  m.on('click', e => {
    L.DomEvent.stopPropagation(e);
    clearSelPin();
    m._icon?.querySelector('.mpin')?.classList.add('sel');
    activeListing = l;
    showPreview(l);
  });

  markers.push({ m, l });
  // Apply current filter to this newly-added pin
  if (activeF !== 'all') updateMapPins();
}

// ── Preview card (mobile) ──────────────────────────────────────────────────
let previewListing = null;

function showPreview(l) {
  previewListing = l;
  const st = GRADS[l._i % GRADS.length];
  const p  = price(l);
  const dj = distJava(l);
  const dw = distWork(l);

  // Image
  const imgWrap = document.getElementById('pv-img');
  const existImg = imgWrap.querySelector('img, .pv-ph');
  if (existImg) existImg.remove();
  const gradDiv = imgWrap.querySelector('.pv-grad') || (() => { const d=document.createElement('div'); d.className='pv-grad'; imgWrap.appendChild(d); return d; })();
  const priceEl = imgWrap.querySelector('.pv-price') || (() => { const d=document.createElement('div'); d.className='pv-price'; imgWrap.appendChild(d); return d; })();
  const existMay = imgWrap.querySelector('.pv-may');
  if (existMay) existMay.remove();

  const pvPhotos = l.photo_urls?.length ? l.photo_urls : l.photo_url ? [l.photo_url] : getCachedPhotos(l.url);
  const pvPhoto = pvPhotos[0] || null;
  if (pvPhoto) {
    const img = document.createElement('img');
    img.src = pvPhoto;
    img.onerror = () => { img.remove(); const ph2=document.createElement('div'); ph2.className='pv-ph'; ph2.style.background=st.g; ph2.textContent=st.e; imgWrap.insertBefore(ph2,gradDiv); };
    imgWrap.insertBefore(img, gradDiv);
  } else {
    const ph = document.createElement('div');
    ph.className = 'pv-ph'; ph.style.background = st.g; ph.textContent = st.e;
    imgWrap.insertBefore(ph, gradDiv);
  }

  priceEl.innerHTML = `${fmtP(p)}<sub>/mo</sub>`;
  if (isMay(l)) { const b=document.createElement('div'); b.className='pv-may'; b.textContent='⭐ May 1st'; imgWrap.appendChild(b); }

  // Body
  document.getElementById('pv-addr').textContent = l.address || 'Amsterdam';
  const tags = document.getElementById('pv-tags');
  tags.innerHTML = '';
  const addTag = (txt, cls='') => { const s=document.createElement('span'); s.className=`pv-tag${cls?' '+cls:''}`; s.textContent=txt; tags.appendChild(s); };
  // Availability + contract — most critical info first
  if (l.available_from) addTag(`🗓 ${l.available_from}`, 'near');
  else if (isMay(l))    addTag('⭐ May 2026', 'near');
  if (l.min_contract)   addTag(`📋 ${l.min_contract} min`, '');
  if (l.size)  addTag(`📐 ${l.size} m²`);
  if (l.rooms) addTag(`🛏 ${l.rooms} rooms`);
  if (dj!=null) addTag(`📍 ${dj.toFixed(1)} km`, dj<=1.5?'near':dj<=3?'mid':'');
  if (dw!=null) addTag(`🚲 ${dw.toFixed(1)} km to work`, dw<=2?'near':'');

  document.getElementById('pv-link').href = l.url || '#';

  document.getElementById('preview').classList.add('show');
  // Keep list button hidden while preview is showing
  document.getElementById('list-btn').classList.add('hidden');
}

function closePreview() {
  document.getElementById('preview').classList.remove('show');
  previewListing = null;
  clearSelPin();
  if (isMobile() && !sheetExpanded) {
    document.getElementById('list-btn').classList.remove('hidden');
  }
}
window.closePreview = closePreview;

function showInList() {
  if (!previewListing) return;
  const i = previewListing._i;
  closePreview();
  expandSheet();
  setTimeout(() => {
    const el = document.querySelector(`[data-i="${i}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('hl');
    setTimeout(() => el.classList.remove('hl'), 2400);
  }, 400);
}
window.showInList = showInList;

// Show a listing on map from list (called by card's map button)
window._showOnMap = function(i) {
  const mk = markers.find(x => x.l._i === i);
  if (!mk) return;
  collapseSheet();
  closePreview();
  setTimeout(() => {
    map.flyTo([mk.l.lat, mk.l.lng], 16, { duration: 0.6 });
    clearSelPin();
    mk.m._icon?.querySelector('.mpin')?.classList.add('sel');
    activeListing = mk.l;
    setTimeout(() => showPreview(mk.l), 650);
  }, isMobile() ? 350 : 0);
};

// ── Geocoding ──────────────────────────────────────────────────────────────
let gQ=[], gRunning=false;
function geocode(addr) {
  const c=gcGet(), k=addr.toLowerCase().trim();
  if (c[k]) return Promise.resolve(c[k]);
  return new Promise(r => { gQ.push({addr,k,r}); runGQ(); });
}
async function runGQ() {
  if (gRunning || !gQ.length) return;
  gRunning = true;
  while (gQ.length) {
    const {addr,k,r} = gQ.shift();
    const clean = addr.replace(/\s*\([^)]+\)/g,'').trim();
    try {
      const q = encodeURIComponent(`${clean}, Amsterdam, Netherlands`);
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=nl`,
        { headers: {'User-Agent':'ApartmentFinder/1.0'} });
      const d = await res.json();
      if (d[0]) { const c2=[parseFloat(d[0].lat),parseFloat(d[0].lon)]; const cc=gcGet(); cc[k]=c2; gcSet(cc); r(c2); }
      else r(null);
    } catch { r(null); }
    if (gQ.length) await new Promise(x=>setTimeout(x,1100));
  }
  gRunning = false;
}
async function geocodeAll(list) {
  let n = 0;
  for (const l of list) {
    if (l.lat && l.lng) { addPin(l); n++; continue; }
    if (!l.address) continue;
    const c = await geocode(l.address);
    if (c) { l.lat=c[0]; l.lng=c[1]; addPin(l); n++; }
  }
}

// ── Map pin visibility sync ───────────────────────────────────────────
function updateMapPins() {
  if (!markers.length) return;
  const visible = new Set(filtered().map(l => l._i));
  const allShown = activeF === 'all';

  markers.forEach(({ m, l }) => {
    const show = allShown || visible.has(l._i);
    m.setOpacity(show ? 1 : 0);
    if (m._icon) m._icon.style.pointerEvents = show ? '' : 'none';
  });

  // Fit map to visible pins when filter is active
  if (!allShown) {
    const pts = markers
      .filter(({ l }) => visible.has(l._i) && l.lat && l.lng)
      .map(({ l }) => [l.lat, l.lng]);
    if (pts.length) {
      map.fitBounds(pts, { padding: [60, 60], maxZoom: 15, animate: true });
    }
  } else {
    // Reset to default view when clearing filter
    map.flyTo(JAVAPLEIN, 13, { duration: 0.6 });
  }
}

// ── Filter / sort ──────────────────────────────────────────────────────────
let ALL=[], activeF='all';

function filtered() {
  let r=[...ALL];
  switch(activeF) {
    case 'may':   r=r.filter(isMay); break;
    case 'u2k':   r=r.filter(l=>price(l)>0&&price(l)<2000); break;
    case '2bed':  r=r.filter(l=>rooms(l)>=2); break;
    case 'big':   r=r.filter(l=>size(l)>=60); break;
    case 'close': r=r.filter(l=>{const d=distJava(l);return d!=null&&d<=2;}); break;
    case 'new7':  r=r.filter(isNew7); break;
  }
  switch(document.getElementById('sorter').value) {
    case 'dist': r.sort((a,b)=>(distJava(a)??99)-(distJava(b)??99)); break;
    case 'p↑':   r.sort((a,b)=>price(a)-price(b)); break;
    case 'p↓':   r.sort((a,b)=>price(b)-price(a)); break;
    case 'sz↓':  r.sort((a,b)=>size(b)-size(a)); break;
    default:     r.sort((a,b)=>new Date(b.date_found||0)-new Date(a.date_found||0));
  }
  return r;
}

// ── Render ─────────────────────────────────────────────────────────────────
function cardHTML(l, idx) {
  const p=price(l), dj=distJava(l), dw=distWork(l);
  const st=GRADS[l._i%GRADS.length];
  const may=isMay(l), newL=isNew7(l), old=isOld(l);

  // Photos — use stored array, or single url, or cache lookup
  const photos = l.photo_urls?.length ? l.photo_urls
               : l.photo_url ? [l.photo_url]
               : getCachedPhotos(l.url);
  const firstPhoto = photos[0] || null;

  const slideHTML = firstPhoto
    ? `<div class="cslide"><img src="${firstPhoto}" alt="" loading="lazy" onerror="this.closest('.cslide').style.display='none'"></div>`
    : `<div class="cslide"><div class="cph" style="background:${st.g}">${st.e}</div></div>`;

  const dotsHTML = photos.length > 1
    ? `<div class="cdots">${photos.map((_,j)=>`<div class="cdot${j===0?' on':''}"></div>`).join('')}</div>
       <div class="cphcount">${photos.length} 📸</div>`
    : '';

  const djStr = dj!=null ? `<span class="tag ${dj<=1.5?'near':dj<=3?'mid':''}">📍 ${dj.toFixed(1)} km</span>` : '';
  const dwStr = dw!=null ? `<span class="tag ${dw<=2?'near':''}">🚲 ${dw.toFixed(1)} km</span>` : '';

  // Availability + contract — shown prominently if available
  const availTxt = l.available_from || (may ? '⭐ May 2026' : null);
  const contractTxt = l.min_contract || null;
  const infoRow = (availTxt || contractTxt) ? `
    <div class="cinfo">
      ${availTxt ? `<span class="ci-avail">🗓 ${availTxt}</span>` : ''}
      ${contractTxt ? `<span class="ci-contract">📋 ${contractTxt} min</span>` : ''}
    </div>` : '';

  return `
    <a class="card${old&&!newL?' old':''}" data-i="${l._i}"
       href="${l.url||'#'}" target="_blank" rel="noopener"
       style="animation-delay:${Math.min(idx*30,250)}ms">
      <div class="cimg">
        <div class="cscroll">${slideHTML}</div>
        <div class="cgrad"></div>
        <div class="cprice">${fmtP(p)}<sub>/mo</sub></div>
        ${may  ? '<div class="cbadge may">⭐ May 1st</div>' : ''}
        ${newL ? '<div class="cbadge new">NEW</div>' : ''}
        ${old&&!newL&&!may ? '<div class="cbadge aged">30d+</div>' : ''}
        ${dotsHTML}
      </div>
      <div class="cbody">
        <div class="caddr">${l.address||'Amsterdam'}</div>
        ${infoRow}
        <div class="ctags">
          ${l.size  ? `<span class="tag">📐 ${l.size} m²</span>` : ''}
          ${l.rooms ? `<span class="tag">🛏 ${l.rooms}</span>` : ''}
          ${djStr}${dwStr}
        </div>
        ${l.summary ? `<div class="csum">${l.summary}</div>` : ''}
        <div class="cfoot">
          <div class="cdate">${daysAgo(l.date_found)}</div>
          <div class="cactions">
            ${l.lat ? `<button class="mapbtn" onclick="event.preventDefault();event.stopPropagation();window._showOnMap(${l._i})">🗺</button>` : ''}
            <span class="viewbtn">View →</span>
          </div>
        </div>
      </div>
    </a>`;
}

function render() {
  const f = filtered();
  const count = `${f.length} apartment${f.length!==1?'s':''}`;
  document.getElementById('rc').textContent = activeF!=='all' ? `${f.length} result${f.length!==1?'s':''}` : '';
  document.getElementById('sh-count').textContent = count + (activeF!=='all'?' (filtered)':'');
  document.getElementById('list-btn-txt').textContent = count;

  const grid = document.getElementById('grid');
  if (!f.length) {
    grid.innerHTML = '<div class="state"><div style="font-size:2em">🔍</div><div style="margin-top:12px">No listings match</div></div>';
    return;
  }
  grid.innerHTML = f.map((l,i)=>cardHTML(l,i)).join('');
}

// ── Bottom sheet ───────────────────────────────────────────────────────────
const sheet      = document.getElementById('sheet');
const shHandle   = document.getElementById('sh-handle');
const shMapBtn   = document.getElementById('sh-mapbtn');
const shFilters  = document.getElementById('sh-filters');
const shSort     = document.getElementById('sh-sort');
const listBtn    = document.getElementById('list-btn');

let sheetExpanded = false;
const isMobile = () => window.innerWidth < 768;

function getMaxTranslate() {
  return sheet.offsetHeight - parseInt(getComputedStyle(document.documentElement)
    .getPropertyValue('--peek')) || 76;
}

function expandSheet() {
  if (!isMobile()) return;
  sheetExpanded = true;
  sheet.classList.remove('no-anim');
  sheet.style.transform = 'translateY(0)';
  shMapBtn.classList.add('vis');
  shFilters.classList.add('vis');
  shSort.classList.add('vis');
  listBtn.classList.add('hidden');
  closePreview();
}
window.expandSheet = expandSheet;

function collapseSheet() {
  if (!isMobile()) return;
  sheetExpanded = false;
  sheet.classList.remove('no-anim');
  sheet.style.transform = `translateY(${getMaxTranslate()}px)`;
  shMapBtn.classList.remove('vis');
  shFilters.classList.remove('vis');
  shSort.classList.remove('vis');
  listBtn.classList.remove('hidden');
}
window.collapseSheet = collapseSheet;

// Tap on handle area when collapsed → expand
shHandle.addEventListener('click', () => {
  if (isMobile() && !sheetExpanded) expandSheet();
});

// Drag
let ty0=0, ty1=0, shY0=0, dragging=false;

function getCurrentY() {
  const t = new WebKitCSSMatrix(getComputedStyle(sheet).transform);
  return t.m42;
}

shHandle.addEventListener('touchstart', e => {
  if (!isMobile()) return;
  ty0 = ty1 = e.touches[0].clientY;
  shY0 = getCurrentY();
  dragging = true;
  sheet.classList.add('no-anim');
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!dragging || !isMobile()) return;
  ty1 = e.touches[0].clientY;
  const dy = ty1 - ty0;
  const newY = Math.max(0, Math.min(getMaxTranslate(), shY0 + dy));
  sheet.style.transform = `translateY(${newY}px)`;
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!dragging || !isMobile()) return;
  dragging = false;
  const dy = ty1 - ty0;
  const cur = getCurrentY();
  const max = getMaxTranslate();
  if (dy > 50 || cur > max * 0.55) collapseSheet();
  else expandSheet();
});

// Also allow dragging the card list to collapse (when at top)
const gridWrap = document.getElementById('grid-wrap');
let listTouchY = 0;
gridWrap.addEventListener('touchstart', e => { listTouchY = e.touches[0].clientY; }, { passive: true });
gridWrap.addEventListener('touchmove', e => {
  if (!isMobile() || !sheetExpanded) return;
  const dy = e.touches[0].clientY - listTouchY;
  if (gridWrap.scrollTop === 0 && dy > 40) collapseSheet();
}, { passive: true });

window.addEventListener('resize', () => {
  if (!isMobile()) { sheet.style.transform = ''; sheet.classList.remove('no-anim'); }
  else if (!sheetExpanded) collapseSheet();
});

// FAB
const fab = document.getElementById('fab');
gridWrap.addEventListener('scroll', () => fab.classList.toggle('vis', gridWrap.scrollTop > 300));
fab.addEventListener('click', () => gridWrap.scrollTo({ top: 0, behavior: 'smooth' }));

// Carousel dot updates (event delegation — handles all cards)
gridWrap.addEventListener('scroll', e => {
  const scroller = e.target.closest?.('.cscroll');
  if (!scroller) return;
  const idx = Math.round(scroller.scrollLeft / (scroller.offsetWidth || 1));
  scroller.closest('.cimg')?.querySelectorAll('.cdot').forEach((d,i) => d.classList.toggle('on', i===idx));
}, { passive: true, capture: true });

// ── Filter sync (both floating + sheet) ───────────────────────────────────
function setFilter(f) {
  activeF = f;
  document.querySelectorAll('.mchip').forEach(c => c.classList.toggle('on', c.dataset.f === f));
  document.querySelectorAll('.schip').forEach(c => c.classList.toggle('on', c.dataset.f === f));
  render();
  updateMapPins();
}

document.getElementById('mf-scroll').addEventListener('click', e => {
  const c = e.target.closest('.mchip'); if (c) setFilter(c.dataset.f);
});
document.getElementById('sh-filters').addEventListener('click', e => {
  const c = e.target.closest('.schip'); if (c) setFilter(c.dataset.f);
});

// ── Validation ─────────────────────────────────────────────────────────────
function checkData(list, meta) {
  const issues = [];
  if (meta?.updated) {
    const age = (Date.now()-new Date(meta.updated))/3600000;
    if (age > 26) issues.push(`⚠️ Data is ${Math.round(age)}h old — daily update may have failed`);
  }
  const furn = list.filter(l => /gemeubileerd|gestoffeerd/i.test(l.furnished||'') && !/unfurnished|kaal/i.test(l.furnished||''));
  if (furn.length) issues.push(`⚠️ ${furn.length} possibly furnished listing(s) in data`);
  document.getElementById('vbanner').textContent = issues.join(' · ');
}

// ── Load ───────────────────────────────────────────────────────────────────
// ── Data loading with stale-while-revalidate ──────────────────────────────────
const DATA_CACHE = 'ams_data_v3';
const DATA_TTL   = 90 * 60 * 1000; // show cached, refresh after 90 min

function boot(listings, meta) {
  ALL = listings.map((l,i) => ({...l, _i:i}));
  document.getElementById('hdr-n').textContent = ALL.length;
  const upd = document.getElementById('hpill-upd');
  if (meta?.updated) {
    const age = (Date.now()-new Date(meta.updated))/3600000;
    upd.textContent = new Date(meta.updated).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    upd.className = `hpill ${age>26?'err':'ok'}`;
  }
  checkData(ALL, meta);
  render();
  if (isMobile()) collapseSheet();
  geocodeAll(ALL);
  setTimeout(() => runPhotoQueue(ALL), 1200);
}

async function fetchFresh(background) {
  try {
    const [dRes, mRes] = await Promise.all([
      fetch(DATA_URL + '?t=' + Math.floor(Date.now()/3600000)),
      fetch(META_URL + '?t=' + Math.floor(Date.now()/3600000)).catch(()=>null),
    ]);
    if (!dRes.ok) throw new Error(`HTTP ${dRes.status}`);
    const listings = await dRes.json();
    const meta = mRes?.ok ? await mRes.json() : null;
    try { localStorage.setItem(DATA_CACHE, JSON.stringify({ listings, meta, savedAt: Date.now() })); } catch {}
    if (!background) boot(listings, meta);
    else if (ALL.length === 0) boot(listings, meta); // fallback if cache was empty
  } catch(err) {
    if (!background) {
      document.getElementById('grid').innerHTML =
        `<div class="state"><div style="font-size:2em">⚠️</div><div style="margin-top:12px">Could not load listings<br><small style="opacity:.6">${err.message}</small></div></div>`;
      if (isMobile()) collapseSheet();
    }
  }
}

async function load() {
  // Show cached data immediately (instant load on repeat visits)
  try {
    const raw = localStorage.getItem(DATA_CACHE);
    if (raw) {
      const { listings, meta, savedAt } = JSON.parse(raw);
      if (listings?.length) {
        boot(listings, meta);
        // Refresh in background if stale
        if (Date.now() - savedAt > DATA_TTL) fetchFresh(true);
        return;
      }
    }
  } catch {}
  // No usable cache — fetch fresh
  await fetchFresh(false);
}

// ── Client-side progressive photo loading ───────────────────────────────────
// Fetches listing pages through a CORS proxy, extracts og:image, caches in
// localStorage. Photos fade in as they load — works for all existing listings
// without needing to re-run the GitHub Action.

const PHOTO_STORE = 'ams_photos_v2';
const CORS_PROXY  = url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

function pCacheGet() { try { return JSON.parse(localStorage.getItem(PHOTO_STORE)||'{}'); } catch { return {}; } }
function pCacheSet(c) { try { localStorage.setItem(PHOTO_STORE, JSON.stringify(c)); } catch {} }

function pCacheKey(url) { return url.split('/').filter(Boolean).slice(-2).join('_').replace(/[^a-z0-9_]/gi,''); }

function extractPhotos(html) {
  const seen = new Set();
  // Only add real image URLs, filter out icons/thumbnails/sprites
  const add = u => {
    if (typeof u !== 'string' || !u.startsWith('http') || seen.has(u)) return false;
    if (!/(images\.pararius|pararius\.com\/.*\.(jpg|jpeg|webp|png))/i.test(u)) {
      if (!/\.(jpg|jpeg|webp|png)(\?|$)/i.test(u)) return false;
    }
    if (/(thumb|100x|200x|300x|icon|logo|sprite|favicon)/i.test(u)) return false;
    seen.add(u); return true;
  };

  // 1. og:image (canonical, always in raw HTML)
  const og = (html.match(/property=["']og:image["'][^>]+content=["']([^"']+)["']/) ||
               html.match(/content=["']([^"']+)["'][^>]+property=["']og:image["']/))?.[1];
  if (og) add(og);

  // 2. __NEXT_DATA__ — Next.js embeds FULL listing data incl. all gallery photos
  //    This is the key fix for Pararius (a Next.js app)
  const nextData = html.match(/<script[^>]+id=["']__NEXT_DATA__["'][^>]*>([\s\S]*?)<\/script>/i)?.[1];
  if (nextData) {
    try {
      const walk = v => {
        if (typeof v === 'string') add(v);
        else if (Array.isArray(v)) v.forEach(walk);
        else if (v && typeof v === 'object') Object.values(v).forEach(walk);
      };
      walk(JSON.parse(nextData));
    } catch {}
  }

  // 3. JSON-LD schema images
  for (const b of html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)) {
    try {
      const obj = JSON.parse(b[1]);
      [].concat(obj.image || obj.photo || []).forEach(u => typeof u === 'string' && add(u));
    } catch {}
  }

  // 4. Pararius CDN fallback (for when raw HTML has direct img tags)
  for (const m of html.matchAll(/https:\/\/images\.pararius\.com\/[^\s"'<>]+?\.(?:jpg|jpeg|webp)/gi)) {
    add(m[0]);
  }

  return [...seen].slice(0, 12);
}

async function proxyFetchPhoto(url) {
  const key = pCacheKey(url);
  const cache = pCacheGet();
  if (key in cache) {
    const v = cache[key];
    if (!v) return null;
    return Array.isArray(v) ? v : [v];
  }

  try {
    const res = await fetch(CORS_PROXY(url), { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const photos = extractPhotos(data.contents || '');
    const c = pCacheGet(); c[key] = photos.length ? photos : ''; pCacheSet(c);
    return photos.length ? photos : null;
  } catch {
    const c = pCacheGet(); c[key] = ''; pCacheSet(c);
    return null;
  }
}

function injectPhotos(i, photos) {
  if (!photos?.length) return;
  const cimg = document.querySelector(`[data-i="${i}"] .cimg`);
  if (!cimg) return;
  const scroller = cimg.querySelector('.cscroll');
  if (!scroller) return;

  // Replace first slide (was gradient)
  const firstSlide = scroller.querySelector('.cslide');
  if (firstSlide && !firstSlide.querySelector('img')) {
    const img = document.createElement('img');
    img.alt = ''; img.loading = 'eager';
    img.onerror = () => {};
    img.src = photos[0];
    firstSlide.innerHTML = '';
    firstSlide.appendChild(img);
  }

  // Add remaining slides
  for (let j = 1; j < photos.length; j++) {
    if (scroller.children.length > j) continue; // already there
    const slide = document.createElement('div');
    slide.className = 'cslide';
    const img = document.createElement('img');
    img.alt = ''; img.loading = 'lazy'; img.src = photos[j];
    img.onerror = () => slide.remove();
    slide.appendChild(img); scroller.appendChild(slide);
  }

  // Add dots + count badge
  if (photos.length > 1 && !cimg.querySelector('.cdots')) {
    cimg.insertAdjacentHTML('beforeend',
      `<div class="cdots">${photos.map((_,j)=>`<div class="cdot${j===0?' on':''}"></div>`).join('')}</div>` +
      `<div class="cphcount">${photos.length} 📸</div>`);
  }

  const l = ALL.find(x => x._i === i);
  if (l) { l.photo_urls = photos; l.photo_url = photos[0]; }
}
// legacy alias
const injectPhoto = (i, url) => injectPhotos(i, [url]);

let _photoQueueRunning = false;
async function runPhotoQueue(listings) {
  if (_photoQueueRunning) return;
  _photoQueueRunning = true;
  for (const l of listings) {
    if (l.photo_urls?.length || !l.url) continue;
    const key = pCacheKey(l.url);
    const cached = pCacheGet()[key];
    if (cached !== undefined) {
      const arr = Array.isArray(cached) ? cached : (cached ? [cached] : []);
      if (arr.length) injectPhotos(l._i, arr);
      continue;
    }
    const photos = await proxyFetchPhoto(l.url);
    if (photos?.length) injectPhotos(l._i, photos);
    await new Promise(r => setTimeout(r, 700));
  }
  _photoQueueRunning = false;
}

// ── Synchronous photo cache lookup (for render) ────────────────────────────
function getCachedPhotos(url) {
  if (!url) return [];
  const v = pCacheGet()[pCacheKey(url)];
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return [v]; // legacy string format
}
function getCachedPhoto(url) { return getCachedPhotos(url)[0] || null; }

// ── Parks & water overlay from OpenStreetMap (cached 7 days) ───────────────────
const FEAT_CACHE = 'ams_features_v3';
const FEAT_TTL   = 7 * 24 * 3600 * 1000;
const OVP_QUERY  = `[out:json][timeout:25];(
way["leisure"="park"](52.28,4.82,52.44,5.02);
way["landuse"="park"](52.28,4.82,52.44,5.02);
way["landuse"="recreation_ground"](52.28,4.82,52.44,5.02);
way["natural"="water"]["water"!="pond"](52.28,4.82,52.44,5.02);
way["waterway"="riverbank"](52.28,4.82,52.44,5.02);
);out geom;`;

function renderMapFeatures(elements) {
  const features = (elements || []).filter(e => e.type==='way' && e.geometry?.length > 3).map(e => ({
    type: 'Feature',
    properties: e.tags || {},
    geometry: {
      type: 'Polygon',
      coordinates: [[...e.geometry.map(n => [n.lon, n.lat]),
                     [e.geometry[0].lon, e.geometry[0].lat]]]
    }
  }));

  // Use Canvas renderer for much faster rendering of many polygons
  L.geoJSON({ type:'FeatureCollection', features }, {
    renderer: L.canvas(),
    style: f => {
      const t = f.properties;
      if (t.leisure==='park' || t.landuse==='park' || t.landuse==='recreation_ground')
        // Brighter green since OSM dark tiles already show some park colour
        return { fillColor:'#1e5e1e', fillOpacity:.22, color:'#2a7a2a', weight:.5, opacity:.5 };
      if (t.natural==='water' || t.waterway==='riverbank')
        return { fillColor:'#0c2e56', fillOpacity:.35, color:'#1a5090', weight:.5, opacity:.6 };
      return { opacity:0, fillOpacity:0 };
    },
    onEachFeature: () => {}
  }).addTo(map);
}

async function loadMapFeatures() {
  // Try cache first
  try {
    const raw = localStorage.getItem(FEAT_CACHE);
    if (raw) {
      const { elements, expires } = JSON.parse(raw);
      if (Date.now() < expires) { renderMapFeatures(elements); return; }
    }
  } catch {}
  // Fetch from Overpass
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method:'POST', body: OVP_QUERY
    });
    if (!res.ok) return;
    const data = await res.json();
    try { localStorage.setItem(FEAT_CACHE, JSON.stringify({ elements: data.elements, expires: Date.now()+FEAT_TTL })); } catch {}
    renderMapFeatures(data.elements);
  } catch {} // silently ignore — map still works without features
}
